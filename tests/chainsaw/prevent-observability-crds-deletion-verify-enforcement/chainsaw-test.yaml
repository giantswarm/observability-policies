apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: prevent-observability-crds-deletion-verify-enforcement
spec:
  steps:
  - name: verify CRD exists before test
    try:
    - assert:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: prometheusrules.monitoring.coreos.com
  - name: attempt to delete protected CRD and expect block
    try:
    - script:
        content: |
          kubectl delete crd prometheusrules.monitoring.coreos.com 2>&1
        check:
          ($error != null): true
          (contains($stdout, 'prevent-observability-crds-deletion')): true
  - name: verify CRD still exists after blocked deletion
    try:
    - assert:
        resource:
          apiVersion: apiextensions.k8s.io/v1
          kind: CustomResourceDefinition
          metadata:
            name: prometheusrules.monitoring.coreos.com
